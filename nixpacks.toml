[phases.setup]
nixPkgs = ["php82", "php82Extensions.mbstring", "php82Extensions.xml", "php82Extensions.curl", "php82Extensions.pdo", "php82Extensions.pdo_mysql", "composer", "nodejs"]

[phases.build]
cmds = [
    "composer install --no-dev",
    "npm install",
    "npm run build",
    "php artisan migrate --force"
]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=$PORT"